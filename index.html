<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>계약서 센터 — contract.gokiseok.com</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a2744;
    --navy-light: #2d3f6b;
    --navy-dim: #111c33;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cream: #faf8f4;
    --paper: #f0ece3;
    --ink: #2a2520;
    --ink-light: #7a7068;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--navy-dim);
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* 배경 패턴 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 80% 60% at 20% 20%, rgba(44,63,107,0.5) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(201,168,76,0.08) 0%, transparent 50%),
      repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 41px);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px 80px;
  }

  /* 상단 로고 */
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 64px;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards;
  }

  .logo-mark {
    width: 36px;
    height: 36px;
    border: 2px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    color: var(--gold);
    letter-spacing: 0;
  }

  .logo-text {
    font-size: 13px;
    letter-spacing: 0.15em;
    color: rgba(250,248,244,0.5);
    font-weight: 300;
  }

  /* 헤더 */
  .hero {
    text-align: center;
    margin-bottom: 72px;
    opacity: 0;
    animation: fadeUp 0.7s 0.1s ease forwards;
  }

  .hero-eyebrow {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 20px;
    font-weight: 400;
  }

  .hero-title {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(28px, 5vw, 46px);
    font-weight: 700;
    line-height: 1.25;
    letter-spacing: 0.05em;
    color: var(--cream);
    margin-bottom: 20px;
  }

  .hero-title span {
    color: var(--gold);
  }

  .hero-desc {
    font-size: 14px;
    color: rgba(250,248,244,0.45);
    font-weight: 300;
    line-height: 1.8;
    letter-spacing: 0.03em;
  }

  /* 카드 그리드 */
  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    width: 100%;
    max-width: 680px;
    opacity: 0;
    animation: fadeUp 0.7s 0.2s ease forwards;
  }

  .card {
    position: relative;
    background: rgba(250,248,244,0.04);
    border: 1px solid rgba(250,248,244,0.1);
    border-radius: 4px;
    padding: 40px 36px 36px;
    text-decoration: none;
    color: inherit;
    overflow: hidden;
    transition: border-color 0.3s, background 0.3s, transform 0.3s;
    cursor: pointer;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--navy-light), var(--gold));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card:hover {
    background: rgba(250,248,244,0.07);
    border-color: rgba(201,168,76,0.35);
    transform: translateY(-4px);
  }

  .card:hover::before { opacity: 1; }

  .card-icon {
    font-size: 28px;
    margin-bottom: 20px;
    display: block;
    filter: grayscale(0.2);
  }

  .card-badge {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.15em;
    padding: 3px 8px;
    border: 1px solid rgba(201,168,76,0.4);
    color: var(--gold);
    border-radius: 2px;
    margin-bottom: 14px;
    font-weight: 400;
  }

  .card-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 19px;
    font-weight: 700;
    color: var(--cream);
    margin-bottom: 12px;
    letter-spacing: 0.03em;
    line-height: 1.4;
  }

  .card-desc {
    font-size: 12.5px;
    color: rgba(250,248,244,0.4);
    line-height: 1.85;
    font-weight: 300;
  }

  .card-arrow {
    position: absolute;
    bottom: 28px;
    right: 28px;
    width: 32px;
    height: 32px;
    border: 1px solid rgba(250,248,244,0.15);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: rgba(250,248,244,0.3);
    transition: all 0.3s;
  }

  .card:hover .card-arrow {
    border-color: var(--gold);
    color: var(--gold);
    transform: translate(2px, -2px);
  }

  /* 하단 */
  .footer {
    margin-top: 56px;
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.7s 0.35s ease forwards;
  }

  .footer-divider {
    width: 40px;
    height: 1px;
    background: rgba(250,248,244,0.15);
    margin: 0 auto 20px;
  }

  .footer-text {
    font-size: 11.5px;
    color: rgba(250,248,244,0.2);
    letter-spacing: 0.08em;
    font-weight: 300;
    line-height: 1.8;
  }

  .footer-text a {
    color: rgba(201,168,76,0.5);
    text-decoration: none;
    transition: color 0.2s;
  }
  .footer-text a:hover { color: var(--gold); }

  /* 애니메이션 */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 560px) {
    .cards { grid-template-columns: 1fr; max-width: 360px; }
    .hero { margin-bottom: 48px; }
    .card { padding: 32px 28px 32px; }
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="logo">
    <div class="logo-mark">契</div>
    <span class="logo-text">contract.gokiseok.com</span>
  </div>

  <div class="hero">
    <div class="hero-eyebrow">Contract Templates</div>
    <h1 class="hero-title">계약서를<br>간편하게 <span>작성</span>하세요</h1>
    <p class="hero-desc">원하는 계약서 유형을 선택하고<br>바로 작성 · 서명 · 출력까지</p>
  </div>

  <div class="cards">

    <a class="card" href="freelance.html">
      <span class="card-icon">📋</span>
      <div class="card-badge">FREELANCE</div>
      <div class="card-title">업무위탁<br>계약서</div>
      <div class="card-desc">프리랜서 · 외주<br>3.3% 원천징수<br>독립사업자 계약</div>
      <div class="card-arrow">→</div>
    </a>

    <a class="card" href="employment.html">
      <span class="card-icon">📝</span>
      <div class="card-badge">EMPLOYMENT</div>
      <div class="card-title">근로<br>계약서</div>
      <div class="card-desc">알바 · 단시간 근로<br>근로기준법 기반<br>시급 · 근무시간 명시</div>
      <div class="card-arrow">→</div>
    </a>

  </div>

  <div class="footer">
    <div class="footer-divider"></div>
    <div class="footer-text">
      본 계약서는 참고용 템플릿입니다. 중요한 계약은 전문가와 상담하세요.<br>
      <a href="https://gokiseok.com">gokiseok.com</a>
    </div>
  </div>

</div>

</body>
</html>
